services:
  db:
    image: postgres:16-alpine
    container_name: assistant-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assistant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistant_password}
      POSTGRES_DB: ${POSTGRES_DB:-assistant_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant_user -d assistant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assistant-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-assistant_db}
      - POSTGRES_USER=${POSTGRES_USER:-assistant_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-assistant_password}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://localhost:5173}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
      - TZ=Europe/Berlin
      - BRIDGE_URL=http://whatsapp-bridge:3001
    volumes:
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    container_name: assistant-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: assistant-whatsapp-bridge
    environment:
      - BACKEND_URL=http://backend:8080
      - SESSION_DIR=/app/sessions
      - PORT=3001
    volumes:
      - whatsapp_sessions:/app/sessions
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  whatsapp_sessions:
